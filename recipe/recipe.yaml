context:
  version: "0.9"

package:
  name: kondo
  version: ${{ version }}

source:
  url: https://github.com/tbillington/kondo/archive/v${{ version }}.tar.gz
  sha256: 188c577f1d21d783cd2b4b43a5cbae5ffe8b085e5773e10846af55968ddd50c4

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - kondo --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Save disk space by cleaning non-essential files from software projects
  homepage: https://github.com/tbillington/kondo
  repository: https://github.com/tbillington/kondo

extra:
  recipe-maintainers:
    - danielnachun
